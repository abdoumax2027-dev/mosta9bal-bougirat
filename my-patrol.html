<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة | إدارة الفوج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <style>
        :root {
            --primary: #1a052d; --primary-light: #4a148c; --accent: #ffc107;
            --bg-body: #f4f0f7; --card-bg: #f1f3f6; --text-main: #333;
            --sidebar-width: 280px; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --drop-shadow: 8px 8px 16px #d1c4e9, -8px -8px 16px #ffffff;
            --inner-shadow: inset 6px 6px 12px #d1c4e9, inset -6px -6px 12px #ffffff;
            --danger: #ff5252;
        }
        [data-theme="dark"] {
            --primary: #0a0212; --primary-light: #a270ff; --accent: #ffc107;
            --bg-body: #120b1e; --card-bg: #1e142d; --text-main: #e0e0e0;
            --drop-shadow: 5px 5px 15px #000000, -2px -2px 10px #2a1b3d;
            --inner-shadow: inset 3px 3px 10px #000000;
            --danger: #ff8a80;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background 0.3s, color 0.3s; }
        body { margin: 0; background: var(--bg-body); color: var(--text-main); overflow-x: hidden; }
        
        /* Sidebar المعدل ليدعم التمرير والصعود والنزول */
        .sidebar { 
            width: var(--sidebar-width); 
            background: linear-gradient(145deg, var(--primary), var(--primary-light)); 
            height: 100vh; 
            position: fixed; 
            right: calc(-1 * var(--sidebar-width)); 
            top: 0; 
            z-index: 2000; 
            transition: var(--transition); 
            box-shadow: -10px 0 30px rgba(0,0,0,0.3); 
            border-radius: 30px 0 0 30px;
            display: flex;
            flex-direction: column; /* تقسيم القائمة عمودياً */
            overflow: hidden;
        }
        .sidebar.active { right: 0; }
        
        .sidebar-header { 
            padding: 40px 20px 20px 20px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0; /* منع الهيدر من الانضغاط عند التمرير */
        }
        .sidebar-header img { width: 85px; height: 85px; border-radius: 20px; border: 3px solid var(--accent); background: #fff; padding: 3px; }
        
        /* منطقة الروابط القابلة للتمرير والصعود والنزول بسلاسة */
        .nav-links { 
            padding: 20px 10px; 
            flex: 1; 
            overflow-y: auto; /* تفعيل الصعود والنزول بشكل ذكي عند زيادة العناصر */
            scrollbar-width: thin; /* تحسين شكل شريط التمرير لمتصفحات فندوز الحاديثة */
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        
        /* تحسين مظهر شريط التمرير داخل القائمة لمتصفحات Webkit (Chrome / Safari) */
        .nav-links::-webkit-scrollbar { width: 6px; }
        .nav-links::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .nav-links a, .nav-links button { display: flex; align-items: center; color: rgba(255,255,255,0.8); padding: 14px 20px; text-decoration: none; margin-bottom: 8px; border-radius: 15px; font-size: 0.95rem; font-weight: 600; background: none; border: none; width: 100%; cursor: pointer; text-align: right; }
        .nav-links a i, .nav-links button i { margin-left: 15px; width: 25px; text-align: center; }
        .nav-links a:hover, .nav-links button:hover, .nav-links a.active { background: var(--accent); color: var(--primary); }

        .top-navbar { background: var(--bg-body); height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(124, 77, 255, 0.1); }
        .logo-box { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 8px 15px; border-radius: 15px; box-shadow: var(--inner-shadow); }
        .logo-box img { width: 32px; height: 32px; border-radius: 50%; }

        .container { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 25px; text-align: center; box-shadow: var(--drop-shadow); border-bottom: 4px solid var(--primary-light); }
        .stat-card i { color: var(--primary-light); font-size: 1.5rem; margin-bottom: 8px; display: block; }
        .stat-card .count { font-size: 1.8rem; font-weight: 900; color: var(--primary-light); }

        .rank-group { margin-bottom: 45px; }
        .group-header { font-size: 1.2rem; font-weight: 900; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; color: var(--primary-light); }
        .group-header::after { content: ''; flex: 1; height: 3px; background: linear-gradient(to left, var(--primary-light), transparent); opacity: 0.3; }
        
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 25px 15px; text-align: center; box-shadow: var(--drop-shadow); cursor: pointer; transition: 0.3s; }
        .card img { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 12px; border: 4px solid var(--bg-body); object-fit: cover; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        .fab-add { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary-light), #6200ea); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-decoration: none; z-index: 1000; font-size: 1.5rem; }

        /* نافذة الحذف والتنظيف السريع المنبثة (Modal) */
        .clean-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: var(--card-bg); width: 90%; max-width: 500px; max-height: 80vh; border-radius: 25px; box-shadow: var(--drop-shadow); z-index: 2500; display: none; flex-direction: column; transition: transform 0.3s; padding: 20px; }
        .clean-modal.active { display: flex; transform: translate(-50%, -50%) scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(124, 77, 255, 0.1); padding-bottom: 15px; margin-bottom: 15px; }
        .modal-title { font-weight: 900; font-size: 1.1rem; color: var(--primary-light); display: flex; align-items: center; gap: 10px; }
        .close-modal { background: none; border: none; font-size: 1.3rem; color: var(--text-main); cursor: pointer; }
        .modal-body { overflow-y: auto; flex: 1; padding-left: 5px; }
        .clean-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: var(--bg-body); margin-bottom: 10px; border-radius: 15px; box-shadow: var(--inner-shadow); }
        .clean-name { font-weight: 700; font-size: 0.95rem; }
        .btn-delete-member { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .btn-delete-member:hover { opacity: 0.9; }

        /* التنسيقات الخاصة بنافذة إدارة الطلائع المنبثقة للقائد */
        .patrol-edit-box { display: flex; flex-direction: column; gap: 8px; width: 100%; background: var(--bg-body); padding: 15px; margin-bottom: 12px; border-radius: 15px; box-shadow: var(--inner-shadow); }
        .patrol-inputs { display: flex; gap: 10px; flex-wrap: wrap; width: 100%; }
        .patrol-inputs input { flex: 1; min-width: 120px; padding: 8px 12px; border-radius: 10px; border: none; background: var(--card-bg); color: var(--text-main); box-shadow: var(--inner-shadow); outline: none; font-size: 0.9rem; }
        .btn-save-patrol { background: var(--primary-light); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; align-self: flex-end; }
        .btn-save-patrol:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <div class="clean-modal" id="cleanModal">
        <div class="modal-header">
            <div class="modal-title"><i class="fa fa-trash-can"></i> قاعدة البيانات | تنظيف سريع</div>
            <button class="close-modal" id="closeCleanModalBtn"><i class="fa fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalCleanList"></div>
    </div>

    <div class="clean-modal" id="patrolsModal">
        <div class="modal-header">
            <div class="modal-title"><i class="fa fa-users-viewfinder"></i> إدارة وتعديل الطلائع الفوجية</div>
            <button class="close-modal" id="closePatrolsModalBtn"><i class="fa fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalPatrolsList">
            <div style="text-align:center; padding: 20px; opacity:0.6;">جاري تحميل الطلائع...</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.jpg">
            <h3 style="color:white; margin: 15px 0 5px 0; font-weight: 900;" id="userNameHeader">--</h3>
            <span id="userRoleBadge" style="background:var(--accent); color:#000; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;"></span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="active"><i class="fa fa-th-large"></i> لوحة القيادة</a>
            
            <button id="openCleanModalBtn" style="color: #ffab40;"><i class="fa fa-screwdriver-wrench"></i> التنظيف السريع</button>
            
            <a href="announcements.html" id="announcementBtn" style="display:none;"><i class="fa fa-bullhorn"></i> جريدة الفوج</a>
            <a href="admin-requests.html" id="requestsBtn" style="display:none;"><i class="fa fa-user-clock"></i> طلبات الانتساب</a>

            <a href="my-patrol.html" id="patrolLinkBtn"><i class="fa fa-users-viewfinder"></i>👥 طليعتي</a>
            <a href="add-member.html"><i class="fa fa-user-plus"></i> إضافة عضو جديد</a>
            <a href="attendance.html"><i class="fa fa-clipboard-check"></i> سجل الحضور</a>
            <a href="archive.html"><i class="fa fa-archive"></i> الأرشيف</a>
            <a href="#" style="color:#ff8a80; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);" id="logoutBtn">
                <i class="fa fa-power-off"></i> تسجيل الخروج
            </a>
        </div>
    </div>

    <div class="main-wrapper">
        <nav class="top-navbar">
            <button id="menuToggleBtn" style="background:none; border:none; color:var(--primary-light); font-size:1.5rem; cursor:pointer;"><i class="fa fa-bars-staggered"></i></button>
            <div class="logo-box">
                <img src="logo.jpg">
                <span id="currentScopeTitle" style="font-weight:900; color: var(--primary-light);">تحميل...</span>
            </div>
            <button id="themeToggleBtn" style="background:none; border:none; color:var(--primary-light); font-size:1.2rem; cursor:pointer;"><i id="tIcon" class="fa fa-moon"></i></button>
        </nav>

        <div class="container">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="search-container" style="position: relative; margin-bottom: 35px;">
                <i class="fa fa-magnifying-glass" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-light);"></i>
                <input type="text" id="search" class="search-box" style="width: 100%; padding: 18px 50px 18px 20px; border-radius: 20px; border: none; box-shadow: var(--inner-shadow); background: var(--card-bg); outline: none; color: var(--text-main);" placeholder="ابحث عن اسم، رتبة، أو زمرة دم...">
            </div>
            <div id="displayArea"></div>
        </div>
    </div>

    <a href="add-member.html" class="fab-add"><i class="fa fa-plus"></i></a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8khplhXDGXO490NJbBbULrjOYxsHnsVw",
            authDomain: "mosta9bl-bouguirat.firebaseapp.com",
            projectId: "mosta9bl-bouguirat",
            storageBucket: "mosta9bl-bouguirat.firebasestorage.app",
            messagingSenderId: "685256422068",
            appId: "1:685256422068:web:f7951128a115d2e7f91de1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const perms = sessionStorage.getItem('permissions'); 
        const myName = sessionStorage.getItem('userName');
        const myWorkshop = sessionStorage.getItem('myWorkshop');

        if (!perms) window.location.href = 'index.html';

        if (perms === 'full') {
            document.getElementById('announcementBtn').style.display = 'flex';
            document.getElementById('requestsBtn').style.display = 'flex';
            
            const patrolBtn = document.getElementById('patrolLinkBtn');
            patrolBtn.href = "#";
            patrolBtn.addEventListener('click', (e) => {
                e.preventDefault();
                togglePatrolsModal();
            });
            
            listenToPatrols();
        }

        document.getElementById('userNameHeader').innerText = myName || "القائد";
        document.getElementById('userRoleBadge').innerText = perms === 'full' ? "القائد العام" : `قائد ورشة ${myWorkshop}`;
        document.getElementById('currentScopeTitle').innerText = perms === 'full' ? "الإدارة العامة للفوج" : `إدارة ورشة ${myWorkshop}`;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleCleanModal() {
            document.getElementById('cleanModal').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            document.getElementById('sidebar').classList.remove('active');
        }

        function togglePatrolsModal() {
            document.getElementById('patrolsModal').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            document.getElementById('sidebar').classList.remove('active');
        }

        function closeAllPanels() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('cleanModal').classList.remove('active');
            document.getElementById('patrolsModal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        document.getElementById('menuToggleBtn').addEventListener('click', toggleMenu);
        document.getElementById('openCleanModalBtn').addEventListener('click', toggleCleanModal);
        document.getElementById('closeCleanModalBtn').addEventListener('click', toggleCleanModal);
        document.getElementById('closePatrolsModalBtn').addEventListener('click', togglePatrolsModal);
        document.getElementById('overlay').addEventListener('click', closeAllPanels);
        document.getElementById('logoutBtn').addEventListener('click', () => { sessionStorage.clear(); window.location.href = 'index.html'; });

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const tIcon = document.getElementById('tIcon');
            if (tIcon) tIcon.className = newTheme === 'dark' ? 'fa fa-sun' : 'fa fa-moon';
        }
        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
        
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        const tIcon = document.getElementById('tIcon');
        if (tIcon) tIcon.className = currentTheme === 'dark' ? 'fa fa-sun' : 'fa fa-moon';

        function listenToMembers() {
            let q = (perms === 'full') ? collection(db, "members") : query(collection(db, "members"), where("workshop", "==", myWorkshop));
            
            onSnapshot(q, (snapshot) => {
                let members = [];
                snapshot.forEach((doc) => { 
                    let data = doc.data();
                    if (data.name || data.rank) {
                        members.push({ 
                            id: doc.id, 
                            name: data.name || "عضو غير مسمى",
                            rank: data.rank || "بدون رتبة",
                            blood: data.blood || "",
                            img: data.img || "logo.jpg",
                            ...data
                        }); 
                    }
                });
                renderUI(members);
                renderCleanList(members); 
            });
        }

        function renderUI(members) {
            const area = document.getElementById('displayArea');
            const statsGrid = document.getElementById('statsGrid');
            
            const activeRanks = members.map(m => m.rank).filter(r => r && r !== "بدون رتبة");
            const uniqueRanksCount = new Set(activeRanks).size;

            statsGrid.innerHTML = `
                <div class="stat-card"><i class="fa fa-users"></i><div>إجمالي الأعضاء الفعليين</div><div class="count">${members.length}</div></div>
                <div class="stat-card"><i class="fa fa-star"></i><div>الوحدات النشطة</div><div class="count">${uniqueRanksCount}</div></div>
            `;
            
            const rankOrder = ["قائد الفوج", "قائد وحدة", "جوال", "كشاف متقدم", "كشاف", "شبل", "برعم", "بدون رتبة"];
            area.innerHTML = "";
            
            rankOrder.forEach(rank => {
                const filtered = members.filter(m => m.rank === rank);
                if(filtered.length > 0) {
                    let section = `<div class="rank-group" data-rank-name="${rank.toLowerCase()}"><div class="group-header">${rank}</div><div class="members-grid">`;
                    filtered.forEach(m => {
                        section += `
                            <div class="card member-item" data-name="${m.name.toLowerCase()}" data-rank="${m.rank.toLowerCase()}" data-blood="${m.blood.toLowerCase()}" onclick="window.location.href='member-details.html?id=${m.id}'">
                                <img src="${m.img}" onerror="this.src='logo.jpg'">
                                <div style="font-weight:900; margin-bottom:8px; font-size:0.9rem;">${m.name}</div>
                                <span class="rank-badge" style="font-size:0.75rem; color: var(--primary-light); opacity: 0.8;">${m.rank}</span>
                            </div>`;
                    });
                    area.innerHTML += section + `</div></div>`;
                }
            });
            doSearch();
        }

        function renderCleanList(members) {
            const cleanListArea = document.getElementById('modalCleanList');
            if (members.length === 0) {
                cleanListArea.innerHTML = `<div style="text-align:center; padding: 20px; opacity:0.6;">لا يوجد أعضاء حالياً</div>`;
                return;
            }
            
            let html = "";
            const sortedMembers = [...members].sort((a, b) => a.name.localeCompare(b.name, 'ar'));
            
            sortedMembers.forEach(m => {
                html += `
                    <div class="clean-item">
                        <span class="clean-name">${m.name} <small style="display:block; font-size:0.7rem; opacity:0.6;">${m.rank}</small></span>
                        <button class="btn-delete-member" data-id="${m.id}" data-name="${m.name}">
                            <i class="fa fa-trash"></i> حذف
                        </button>
                    </div>
                `;
            });
            cleanListArea.innerHTML = html;

            cleanListArea.querySelectorAll('.btn-delete-member').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const name = btn.getAttribute('data-name');
                    
                    if (confirm(`هل أنت متأكد تماماً من حذف العضو "${name}" نهائياً من الفوج؟`)) {
                        try {
                            await deleteDoc(doc(db, "members", id));
                        } catch (error) {
                            alert("حدث خطأ أثناء محاولة الحذف، يرجى التحقق من الصلاحيات.");
                            console.error(error);
                        }
                    }
                };
            });
        }

        function listenToPatrols() {
            onSnapshot(collection(db, "patrols"), (snapshot) => {
                const patrolsListArea = document.getElementById('modalPatrolsList');
                if (snapshot.empty) {
                    patrolsListArea.innerHTML = `<div style="text-align:center; padding: 20px; opacity:0.6;">لا توجد طلائع مسجلة حالياً في السيرفر</div>`;
                    return;
                }

                let html = "";
                snapshot.forEach((doc) => {
                    let pData = doc.data();
                    html += `
                        <div class="patrol-edit-box">
                            <div style="font-weight: 900; font-size: 0.95rem; margin-bottom: 5px; color: var(--primary-light);">
                                <i class="fa fa-shield-halved"></i> معرف الطليعة المرجعي: ${doc.id}
                            </div>
                            <div class="patrol-inputs">
                                <input type="text" id="pName-${doc.id}" value="${pData.name || ''}" placeholder="اسم الطليعة">
                                <input type="text" id="pPass-${doc.id}" value="${pData.password || ''}" placeholder="كلمة السر الجديدة">
                            </div>
                            <button class="btn-save-patrol" data-id="${doc.id}">
                                <i class="fa fa-floppy-disk"></i> حفظ التعديل
                            </button>
                        </div>
                    `;
                });
                patrolsListArea.innerHTML = html;

                patrolsListArea.querySelectorAll('.btn-save-patrol').forEach(btn => {
                    btn.onclick = async (e) => {
                        const id = btn.getAttribute('data-id');
                        const updatedName = document.getElementById(`pName-${id}`).value.trim();
                        const updatedPass = document.getElementById(`pPass-${id}`).value.trim();

                        if (!updatedName || !updatedPass) {
                            alert("يرجى ملء الحقول المطلوبة لاسم الطليعة وكلمة المرور.");
                            return;
                        }

                        try {
                            await updateDoc(doc(db, "patrols", id), {
                                name: updatedName,
                                password: updatedPass
                            });
                            alert(`تم تحديث بيانات الطليعة بنجاح.`);
                        } catch (err) {
                            alert("فشلت عملية الحفظ، تحقق من الاتصال وقواعد الأمان لـ Firebase.");
                            console.error(err);
                        }
                    };
                });
            });
        }

        function doSearch() {
            let val = document.getElementById('search').value.toLowerCase().trim();
            
            document.querySelectorAll('.rank-group').forEach(group => {
                let visibleCardsInGroup = 0;
                let items = group.querySelectorAll('.member-item');
                
                items.forEach(item => {
                    let name = item.getAttribute('data-name') || "";
                    let rank = item.getAttribute('data-rank') || "";
                    let blood = item.getAttribute('data-blood') || "";
                    
                    if (name.includes(val) || rank.includes(val) || blood.includes(val)) {
                        item.style.display = "block";
                        visibleCardsInGroup++;
                    } else {
                        item.style.display = "none";
                    }
                });
                
                if (visibleCardsInGroup > 0) {
                    group.style.display = "block";
                } else {
                    group.style.display = "none";
                }
            });
        }
        document.getElementById('search').addEventListener('keyup', doSearch);

        listenToMembers();
    </script>
</body>
</html>
