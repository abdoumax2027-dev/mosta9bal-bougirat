<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة | إدارة الفوج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <style>
        :root {
            --primary: #1a052d; --primary-light: #4a148c; --accent: #ffc107;
            --bg-body: #f4f0f7; --card-bg: #f1f3f6; --text-main: #333;
            --sidebar-width: 280px; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --drop-shadow: 8px 8px 16px #d1c4e9, -8px -8px 16px #ffffff;
            --inner-shadow: inset 6px 6px 12px #d1c4e9, inset -6px -6px 12px #ffffff;
        }
        [data-theme="dark"] {
            --primary: #0a0212; --primary-light: #a270ff; --accent: #ffc107;
            --bg-body: #120b1e; --card-bg: #1e142d; --text-main: #e0e0e0;
            --drop-shadow: 5px 5px 15px #000000, -2px -2px 10px #2a1b3d;
            --inner-shadow: inset 3px 3px 10px #000000;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background 0.3s, color 0.3s; }
        body { margin: 0; background: var(--bg-body); color: var(--text-main); overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: linear-gradient(145deg, var(--primary), var(--primary-light)); height: 100vh; position: fixed; right: calc(-1 * var(--sidebar-width)); top: 0; z-index: 2000; transition: var(--transition); box-shadow: -10px 0 30px rgba(0,0,0,0.3); border-radius: 30px 0 0 30px; }
        .sidebar.active { right: 0; }
        .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header img { width: 85px; height: 85px; border-radius: 20px; border: 3px solid var(--accent); background: #fff; padding: 3px; }
        
        .nav-links { padding: 20px 10px; }
        .nav-links a, .nav-links button { display: flex; align-items: center; color: rgba(255,255,255,0.8); padding: 14px 20px; text-decoration: none; margin-bottom: 8px; border-radius: 15px; font-size: 0.95rem; font-weight: 600; background: none; border: none; width: 100%; cursor: pointer; text-align: right; }
        .nav-links a i, .nav-links button i { margin-left: 15px; width: 25px; text-align: center; }
        .nav-links a:hover, .nav-links button:hover, .nav-links a.active { background: var(--accent); color: var(--primary); }

        .top-navbar { background: var(--bg-body); height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(124, 77, 255, 0.1); }
        .logo-box { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 8px 15px; border-radius: 15px; box-shadow: var(--inner-shadow); }
        .logo-box img { width: 32px; height: 32px; border-radius: 50%; }

        .container { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 25px; text-align: center; box-shadow: var(--drop-shadow); border-bottom: 4px solid var(--primary-light); }
        .stat-card i { color: var(--primary-light); font-size: 1.5rem; margin-bottom: 8px; display: block; }
        .stat-card .count { font-size: 1.8rem; font-weight: 900; color: var(--primary-light); }

        .rank-group { margin-bottom: 45px; }
        .group-header { font-size: 1.2rem; font-weight: 900; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; color: var(--primary-light); }
        .group-header::after { content: ''; flex: 1; height: 3px; background: linear-gradient(to left, var(--primary-light), transparent); opacity: 0.3; }
        
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 25px 15px; text-align: center; box-shadow: var(--drop-shadow); cursor: pointer; transition: 0.3s; }
        .card img { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 12px; border: 4px solid var(--bg-body); object-fit: cover; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        .fab-add { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary-light), #6200ea); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-decoration: none; z-index: 1000; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.jpg">
            <h3 style="color:white; margin: 15px 0 5px 0; font-weight: 900;" id="userNameHeader">--</h3>
            <span id="userRoleBadge" style="background:var(--accent); color:#000; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;"></span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="active"><i class="fa fa-th-large"></i> لوحة القيادة</a>
            
            <a href="announcements.html" id="announcementBtn" style="display:none;"><i class="fa fa-bullhorn"></i> جريدة الفوج</a>
            
            <a href="admin-requests.html" id="requestsBtn" style="display:none;"><i class="fa fa-user-clock"></i> طلبات الانتساب</a>

            <a href="my-patrol.html"><i class="fa fa-users-viewfinder"></i> طليعتي</a>
            <a href="add-member.html"><i class="fa fa-user-plus"></i> إضافة عضو جديد</a>
            <a href="attendance.html"><i class="fa fa-clipboard-check"></i> سجل الحضور</a>
            <a href="archive.html"><i class="fa fa-archive"></i> الأرشيف</a>
            <a href="#" style="color:#ff8a80; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);" onclick="logout()">
                <i class="fa fa-power-off"></i> تسجيل الخروج
            </a>
        </div>
    </div>

    <div class="main-wrapper">
        <nav class="top-navbar">
            <button onclick="toggleMenu()" style="background:none; border:none; color:var(--primary-light); font-size:1.5rem; cursor:pointer;"><i class="fa fa-bars-staggered"></i></button>
            <div class="logo-box">
                <img src="logo.jpg">
                <span id="currentScopeTitle" style="font-weight:900; color: var(--primary-light);">تحميل...</span>
            </div>
            <button onclick="toggleTheme()" style="background:none; border:none; color:var(--primary-light); font-size:1.2rem; cursor:pointer;"><i id="tIcon" class="fa fa-moon"></i></button>
        </nav>

        <div class="container">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="search-container" style="position: relative; margin-bottom: 35px;">
                <i class="fa fa-magnifying-glass" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-light);"></i>
                <input type="text" id="search" class="search-box" onkeyup="doSearch()" style="width: 100%; padding: 18px 50px 18px 20px; border-radius: 20px; border: none; box-shadow: var(--inner-shadow); background: var(--card-bg); outline: none; color: var(--text-main);" placeholder="ابحث عن أي عضو...">
            </div>
            <div id="displayArea"></div>
        </div>
    </div>

    <a href="add-member.html" class="fab-add"><i class="fa fa-plus"></i></a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        // ... Firebase Configuration ...
        const firebaseConfig = {
            apiKey: "AIzaSyC8khplhXDGXO490NJbBbULrjOYxsHnsVw",
            authDomain: "mosta9bl-bouguirat.firebaseapp.com",
            projectId: "mosta9bl-bouguirat",
            storageBucket: "mosta9bl-bouguirat.firebasestorage.app",
            messagingSenderId: "685256422068",
            appId: "1:685256422068:web:f7951128a115d2e7f91de1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const perms = sessionStorage.getItem('permissions'); 
        const myName = sessionStorage.getItem('userName');
        const myWorkshop = sessionStorage.getItem('myWorkshop');

        if (!perms) window.location.href = 'index.html';

        // إظهار الأزرار الخاصة بالقائد العام فقط
        if (perms === 'full') {
            document.getElementById('announcementBtn').style.display = 'flex';
            document.getElementById('requestsBtn').style.display = 'flex';
        }

        document.getElementById('userNameHeader').innerText = myName || "القائد";
        document.getElementById('userRoleBadge').innerText = perms === 'full' ? "القائد العام" : `قائد ورشة ${myWorkshop}`;
        document.getElementById('currentScopeTitle').innerText = perms === 'full' ? "الإدارة العامة للفوج" : `إدارة ورشة ${myWorkshop}`;

        function listenToMembers() {
            let q = (perms === 'full') ? collection(db, "members") : query(collection(db, "members"), where("workshop", "==", myWorkshop));
            onSnapshot(q, (snapshot) => {
                let members = [];
                snapshot.forEach((doc) => { members.push({ id: doc.id, ...doc.data() }); });
                renderUI(members);
            });
        }

        function renderUI(members) {
            const area = document.getElementById('displayArea');
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card"><i class="fa fa-users"></i><div>الأعضاء</div><div class="count">${members.length}</div></div>
                <div class="stat-card"><i class="fa fa-star"></i><div>الرتب</div><div class="count">${new Set(members.map(m => m.rank)).size}</div></div>
            `;
            const rankOrder = ["قائد الفوج", "قائد وحدة", "جوال", "كشاف متقدم", "كشاف", "شبل", "برعم"];
            area.innerHTML = "";
            rankOrder.forEach(rank => {
                const filtered = members.filter(m => m.rank === rank);
                if(filtered.length > 0) {
                    let section = `<div class="rank-group"><div class="group-header">${rank}</div><div class="members-grid">`;
                    filtered.forEach(m => {
                        section += `
                            <div class="card member-item" data-name="${m.name}" onclick="window.location.href='member-details.html?id=${m.id}'">
                                <img src="${m.img || 'logo.jpg'}" onerror="this.src='logo.jpg'">
                                <div style="font-weight:900; margin-bottom:8px; font-size:0.9rem;">${m.name}</div>
                                <span class="rank-badge" style="font-size:0.75rem; color: var(--primary-light); opacity: 0.8;">${m.rank}</span>
                            </div>`;
                    });
                    area.innerHTML += section + `</div></div>`;
                }
            });
        }

        listenToMembers();
        window.logout = () => { sessionStorage.clear(); window.location.href = 'index.html'; };
    </script>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function doSearch() {
            let val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.member-item').forEach(item => {
                let name = item.getAttribute('data-name').toLowerCase();
                item.style.display = name.includes(val) ? "block" : "none";
            });
        }
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('tIcon').className = next === 'dark' ? 'fa fa-sun' : 'fa fa-moon';
        }
    </script>
</body>
</html>
